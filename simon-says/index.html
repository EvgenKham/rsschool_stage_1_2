    <div class="wrapper">
      <h1 claas="header">Simon says</h1>
      <div class="settings">
        <div class="settings__available">
          <div class="btn btn_new-game">New game</div>
          <div class="btn btn_repeat">Repeat the sequence</div>
        </div>
        <div class="settings__unavailable">
          <div class="chosen-level">Level: Easy</div>
          <div class="raund">Raund: 1 / 5</div>
          <div class=""></div>
        </div>
      </div>
      <div class="display">
        <div class="display__letter">A</div>
        <div class="display__letter">B</div>
        <div class="display__letter">C</div>
        <div class="display__letter">D</div>
        <div class="display__letter">E</div>
        <div class="display__letter">F</div>
        <div class="display__letter">G</div>
        <div class="display__letter">H</div>
        <div class="display__letter">I</div>
        <div class="display__letter">J</div>
      </div>
      <div class="keyboard-container">
        <div class="key-numbers">
          <div class="btn btn_number">1</div>
          <div class="btn btn_number">2</div>
          <div class="btn btn_number">3</div>
          <div class="btn btn_number">4</div>
          <div class="btn btn_number">5</div>
          <div class="btn btn_number">6</div>
          <div class="btn btn_number">7</div>
          <div class="btn btn_number">8</div>
          <div class="btn btn_number">9</div>
          <div class="btn btn_number">0</div>
        </div>
        <div class="key-letters">
          <div class="btn btn_letter">Q</div>
          <div class="btn btn_letter">W</div>
          <div class="btn btn_letter">R</div>
          <div class="btn btn_letter">T</div>
          <div class="btn btn_letter">Y</div>
          <div class="btn btn_letter">U</div>
          <div class="btn btn_letter">I</div>
          <div class="btn btn_letter">O</div>
          <div class="btn btn_letter">P</div>
          <div class="btn btn_letter">A</div>
          <div class="btn btn_letter">S</div>
          <div class="btn btn_letter">D</div>
          <div class="btn btn_letter">F</div>
          <div class="btn btn_letter">G</div>
          <div class="btn btn_letter">H</div>
          <div class="btn btn_letter">J</div>
          <div class="btn btn_letter">K</div>
          <div class="btn btn_letter">L</div>
          <div class="btn btn_letter">Z</div>
          <div class="btn btn_letter">X</div>

          <div class="btn btn_letter">V</div>
          <div class="btn btn_letter">B</div>
          <div class="btn btn_letter">N</div>
