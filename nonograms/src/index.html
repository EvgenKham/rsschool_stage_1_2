<!doctype html>

    <link rel="icon" href="assets/images/icon-crossword-68.png" />
    <link

    <title>Nonogram</title>

  <body>
    <div class="bg-game"></div>
    <div class="popup popup_start">
      <div class="popup__container">
        <div class="popup__content">
          <p class="popup__title">Choose level</p>
          <div class="level">
            <div class="level__btn easy">
              <input type="radio" id="level-easy" name="radio" value="easy" checked="true" />
              <label for="level-easy">5 x 5</label>
            </div>
            <div class="level__btn medium">
              <input type="radio" id="level-medium" name="radio" value="medium" />
              <label for="level-easy">10 x 10</label>
            </div>
            <div class="level__btn hard">
              <input type="radio" id="level-hard" name="radio" value="hard" />
              <label for="level-easy">15 x 15</label>
            </div>
          </div>
          <div class="puzzle">
            <div class="puzzle__easy">
              <div class="puzzle__item">1</div>
              <div class="puzzle__item">2</div>
              <div class="puzzle__item">3</div>
              <div class="puzzle__item">4</div>
              <div class="puzzle__item">5</div>
            </div>
            <div class="puzzle__medium puzzle__hidden">
              <div class="puzzle__item">6</div>
              <div class="puzzle__item">7</div>
              <div class="puzzle__item">8</div>
              <div class="puzzle__item">9</div>
              <div class="puzzle__item">10</div>
            </div>
            <div class="puzzle__hard puzzle__hidden">
              <div class="puzzle__item">11</div>
              <div class="puzzle__item">12</div>
              <div class="puzzle__item">13</div>
              <div class="puzzle__item">14</div>
              <div class="puzzle__item">15</div>
            </div>
          </div>
          <div class="start btn"></div>
        </div>
      </div>
    </div>

        </div>
        <div class="settings">
          <div class="best-results settings__icon">

          <div class="switch-sound settings__icon">
