        <nav class="header__navigation">
          <button class="btn btn_nav btn_about">About</button>
          <button class="btn btn_nav btn_disable btn_logout">Logout</button>
        </nav>
      </header>
      <main class="main">

        <section class="chat">
          <div class="chat__sidebar">
            <input type="search" class="chat__search" placeholder="Search..." />
            <ul class="chat__list-person">
              <li class="item-person">
                <span class="item-person__status online"></span>
                <span class="item-person__name">Anna</span>
                <span class="item-person__unreaded">3</span>
              </li>
              <li class="item-person" id="Evgen">
                <span class="item-person__status offline"></span>
                <span class="item-person__name">Evgen</span>
                <span class="item-person__unreaded"></span>
              </li>
            </ul>
          </div>
          <div class="dialog">
            <div class="dialog__info person">
              <div class="person__name">Evgen</div>
              <div class="person__status_offline">offline</div>
            </div>
            <div class="dialog__message-wrapper">
              <div class="message-box">
                <div class="message">
                  <div class="message__header">
                    <span class="message__author">Ivan</span>
                    <span class="message__time">4:43 PM</span>
                  </div>
                  <pre class="message__text">Hello</pre>
                  <div class="message__footer">
                    <span class="message__state-edited">edit</span>
                    <span class="message__state">readed</span>
                  </div>
                  <div class="message__buttons">
                    <button class="message__remove">
                      <img
                        class="remove-icon icon"
                        src="assets/icons/delete-icon.svg"
                      />
                    </button>
                    <button class="message__edit">
                      <img
                        class="edit-icon icon"
                        src="assets/icons/edit-icon.svg"
                      />
                    </button>
                  </div>
                </div>
                <div class="message message_private">
                  <div class="message__header">
                    <span class="message__author">Evgen (you)</span>
                    <span class="message__time">5:13 PM</span>
                  </div>
                  <pre class="message__text">How are you?</pre>
                  <div class="message__footer">
                    <span class="message__state-edited">edit</span>
                    <span class="message__state">readed</span>
                  </div>
                  <div class="message__buttons">
                    <button class="message__remove">
                      <img
                        class="remove-icon icon"
                        src="assets/icons/delete-icon.svg"
                      />
                    </button>
                    <button class="message__edit">
                      <img
                        class="edit-icon icon"
                        src="assets/icons/edit-icon.svg"
                      />
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <form class="dialog__form text">
              <textarea class="text__container"></textarea>
              <button class="text__send btn_disable" type="button" disabled>
                <img class="send-icon icon" src="assets/icons/send-icon.svg" />
              </button>
            </form>
          </div>
        </section>

        <a class="footer__github" href="https://github.com/EvgenKham">
