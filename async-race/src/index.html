<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Race</title>
    <link

      href="./assets/icons/flag-favicon.png"
      type="image/png"
    />

    <div class="cal">
      <center>
        <form>
          <br />
          <p>Result : <span id="display"></span></p>

            placeholder="Enter first number"
            name="firstnumber"

            min="1"

          <input
            type="number"
            class="input"
            placeholder="Enter second number"
            name="secondnumber"

          /><br /><br />

        </form>
      </center>
    </div>
    <script type="module" src="./index.js"></script>
